<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Cyber Deck - DedSec Edition</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main class="crt">
      <div class="scanlines"></div>
      <div class="flicker"></div>

      <section class="panel">
        <div class="panel-header">~/nodes/code_injector</div>
        <div class="panel-body">
          <div class="streamer-column">
            <pre id="code-streamer"></pre>
          </div>

          <div class="side-column">
            <div class="gif-wrapper">
              <img
                src="images/watch-dogs2-dedsec.gif"
                alt="DedSec Node Active"
                class="retro-gif"
              />
            </div>
            <div class="app-description">
              <h3 class="desc-title">SYS_MODULE: INJECTOR</h3>
              <div id="app-purpose-text"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
